0 10-112 0zm280 0a56 56 0 10112 0 56 56 0 10-112 0z"></path></svg></span><i class="ant-menu-submenu-arrow"></i></div></li></ul><div style="display:none" aria-hidden="true"></div></header><main class="ant-layout-content" style="min-width:100%"><div style="align-items:center;justify-content:center;min-height:600px;display:flex"><div class="ant-spin ant-spin-spinning"><span class="ant-spin-dot ant-spin-dot-spin"><i class="ant-spin-dot-item"></i><i class="ant-spin-dot-item"></i><i class="ant-spin-dot-item"></i><i class="ant-spin-dot-item"></i></span></div></div></main><footer class="ant-layout-footer" style="text-align:center;background-color:#ffffff;border-top:solid 1px #d0d0d0">Artful Dodger Demo<!-- --> ©<!-- -->2022</footer></section></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"config":{"metadataUrl":"https://opensheet.vercel.app/134_5I84cpDHYFCfCgr1V7p8ArxeNPlOMcS1-D5E3jxk/metadata","imagePrefix":"https://images.pexels.com/photos","forceCDN":"true","title":"Artful Dodger Demo","aboutData":"\u003ch1\u003eThe Artful Dodger\u003c/h1\u003e\n\u003cp\u003eA Next.js site to host an art gallery using Google Spreadsheets and Google\nDrive as a backend.\u003c/p\u003e\n\u003ch2\u003eSetup\u003c/h2\u003e\n\u003ch3\u003eData Backend\u003c/h3\u003e\n\u003cp\u003eThe project can be powered by using a Google Spreadsheet that is viewable\npublicly. The demo site for this project is powered by the Google Sheet\n\u003ca href=\"https://docs.google.com/spreadsheets/d/134_5I84cpDHYFCfCgr1V7p8ArxeNPlOMcS1-D5E3jxk/\"\u003ehere\u003c/a\u003e. You\ncan setup a similar document and make it \"readable\" by everyone with the link.\u003c/p\u003e\n\u003cp\u003eThe example document uses images from the web (freely available on\nPexels.com). But, you can use a Google Drive to upload the images. You can then\neither use a CDN like Cloudinary to \u003ca href=\"https://cloudinary.com/documentation/fetch_remote_images#auto_upload_remote_resources\"\u003eautomatically serve the\nimages\u003c/a\u003e\nfrom Google Drive. Or download the images onto your web server into the\ndirectory from where you are serving the \"built\" site.\u003c/p\u003e\n\u003ch3\u003eConfiguration\u003c/h3\u003e\n\u003cp\u003eTo configure your site, copy the \u003ccode\u003e.env.local.default\u003c/code\u003e file to \u003ccode\u003e.env.local\u003c/code\u003e and\nedit it to point to your Google Spreadsheet and your CDN, if you are using one.\u003c/p\u003e\n\u003cp\u003eYou can either use a free service like opensheet.vercel.app to convert the\nspreadsheet to a JSON end-point, or use the \u003ccode\u003escripts/download-images\u003c/code\u003e script to\ndownload the metadata as a json file to \u003ccode\u003epublic/metadata.json\u003c/code\u003e. You need to\nremove the \u003ccode\u003eMETADATA_URL\u003c/code\u003e configuration from the \u003ccode\u003e.env.local\u003c/code\u003e file if you with\nto use the \u003ccode\u003emetadata.json\u003c/code\u003e file from your \u003ccode\u003epublic/\u003c/code\u003e directory.\u003c/p\u003e\n\u003cp\u003eSet \u003ccode\u003eIMAGE_CDN_PREFIX=\"\"\u003c/code\u003e if you are using locally downloaded images on your\nserver. Configure the thumbnails in the metadata document so that your images\ncan be found at the location -- \u003ccode\u003e${IMAGE_CDN_PREFIX}/image/${thumbnail}\u003c/code\u003e. You\ncan use a \u003ccode\u003e../\u003c/code\u003e prefix on your thumbnails, if thumbnails don't live in an\n\u003ccode\u003eimage\u003c/code\u003e directory.\u003c/p\u003e\n\u003cp\u003eALso, remove the \u003ccode\u003eFORCE_CDN\u003c/code\u003e configuration, if you wish to not use CDN when\ndeveloping locally.\u003c/p\u003e\n\u003ch2\u003eBuild \u0026#x26; Deploy\u003c/h2\u003e\n\u003cp\u003e\u003ccode\u003eyarn build\u003c/code\u003e builds the site. And \u003ccode\u003eyarn export\u003c/code\u003e would export the site to a\nstatic site.\u003c/p\u003e\n\u003cp\u003eSee sample deploy scripts in the \u003ccode\u003escripts/\u003c/code\u003e directory to see how to deploy this\nsite. You can see a demo site \u003ca href=\"https://punchagan.github.io/artful-dodger/\"\u003ehere\u003c/a\u003e.\u003c/p\u003e\n","aboutDescription":"Sample About Page"}},"__N_SSG":true},"page":"/rooms","query":{},"buildId":"e7tBXZYOIEP9qVKKXrqDB","assetPrefix":"/artful-dodger","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
